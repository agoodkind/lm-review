run:
  timeout: 5m

linters:
  enable:
    - gofmt
    - gofumpt
    - goimports
    - govet
    - staticcheck
    - unused
    - errcheck
    - ineffassign
    - misspell
    - revive
    - cyclop
    - funlen
    - gocognit

linters-settings:
  cyclop:
    max-complexity: 15

  funlen:
    lines: 80
    statements: 50

  gocognit:
    min-complexity: 30

  revive:
    rules:
      - name: exported
      - name: unexported-return
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: increment-decrement
      - name: var-declaration
      - name: range
      - name: receiver-naming
      - name: indent-error-flow
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code

issues:
  exclude-dirs:
    - gen
  exclude-files:
    - ".*_test.go"
  max-issues-per-linter: 0
  max-same-issues: 0
