syntax = "proto3";

package lmreview;

option go_package = "goodkind.io/lm-review/api/reviewpb";

service LMReviewD {
  rpc ReviewDiff(ReviewRequest) returns (ReviewResponse);
  rpc ReviewPR(ReviewRequest) returns (ReviewResponse);
  rpc ReviewRepo(ReviewRequest) returns (ReviewResponse);
  rpc ReviewStatic(StaticReviewRequest) returns (ReviewResponse);
}

message ReviewRequest {
  string diff    = 1;
  string depth   = 2; // quick | normal | deep | ultra (empty = normal)
  string context = 3; // optional extra context (e.g. PR title)
  string model   = 4; // override model for this request (empty = use config)
  string path    = 5; // absolute path to repo root for project-local rule loading
}

message ReviewResponse {
  string verdict  = 1; // pass | warn | block
  string summary  = 2;
  string model    = 3;
  int64  latency_ms = 4;
  repeated Issue issues = 5;
}

message StaticReviewRequest {
  string path = 1; // absolute path to repo root
  repeated string files = 2; // optional relative file set
  repeated string disabled_sources = 3; // vet | staticcheck | custom | semgrep
  repeated string enabled_checks = 4; // exact check allowlist
  bool synthesize = 5; // false = raw findings only
  string depth = 6; // quick | normal | deep | ultra (only for synthesize mode)
  string model = 7; // optional model override (only for synthesize mode)
}

message Issue {
  string severity   = 1; // error | warning | info
  string file       = 2;
  int32  line       = 3;
  string rule       = 4;
  string message    = 5;
  string category   = 6; // style | security | performance | ...
  int32  end_line   = 7;
  string suggestion = 8;
  string confidence = 9; // high | medium | low
}
