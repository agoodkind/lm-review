version: 2

project_name: lm-review

builds:
  - id: lm-review
    main: ./cmd/lm-review
    binary: lm-review
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: lm-review
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Sign and notarize darwin binaries.
# Skipped automatically when APPLE_DEVELOPER_ID_CERT is not set (e.g. local builds).
# Required GitHub Secrets:
#   APPLE_DEVELOPER_ID_CERT            — base64-encoded p12 (export from Keychain, fingerprint 2CDFBE325B6CC880D8B739B4F724F2254E3769A5)
#   APPLE_DEVELOPER_ID_CERT_PASSWORD   — p12 export password
#   APPLE_NOTARYTOOL_ISSUER_ID         — App Store Connect issuer UUID
#   OP_SERVICE_ACCOUNT_TOKEN           — 1Password service account (loads APPLE_NOTARYTOOL_KEY)
#   APPLE_NOTARYTOOL_KEY_ID            — hardcoded to JHC8GR65Q3 in the workflow
notarize:
  macos:
    - enabled: '{{ isEnvSet "APPLE_DEVELOPER_ID_CERT" }}'
      ids:
        - lm-review
      sign:
        certificate: "{{.Env.APPLE_DEVELOPER_ID_CERT}}"
        password: "{{.Env.APPLE_DEVELOPER_ID_CERT_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.APPLE_NOTARYTOOL_ISSUER_ID}}"
        key_id: "{{.Env.APPLE_NOTARYTOOL_KEY_ID}}"
        key: "{{.Env.APPLE_NOTARYTOOL_KEY}}"
        wait: true
        timeout: 20m

release:
  name_template: "{{ .ProjectName }} {{ .Date }} ({{ .ShortCommit }})"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - Merge pull request
      - Merge branch
